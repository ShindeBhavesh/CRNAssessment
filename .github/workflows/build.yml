name: build

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore ProductManagementSystem.sln
      - name: Build
        run: dotnet build ProductManagementSystem.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test ProductManagementSystem.sln --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f src/API/Dockerfile -t pms-api:ci .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t pms-frontend:ci .