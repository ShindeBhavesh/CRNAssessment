version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: pms-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_strong_password123"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  backend:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    container_name: pms-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ProductManagementDb;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True"
      Jwt__Key: "VeryStrongSuperSecretKeyThatIsAtLeast32Chars!"
      Jwt__Issuer: "ProductManagementSystem"
      Jwt__Audience: "ProductManagementSystemClient"
      Jwt__AccessTokenMinutes: 15
      Jwt__RefreshTokenDays: 7
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pms-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  sql_data: